server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/novel_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&failOverReadOnly=false&maxReconnects=10&initialTimeout=2&connectTimeout=10000&socketTimeout=30000
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      initialization-fail-timeout: -1
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.meai.cloud}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.8
          max-tokens: 4096
          # 单次 HTTP 读超时（含润色等所有 chat）；过大易挂死过久，过小易误判；可配 300s~600s 与 novel.llm.polish-max-attempts 联用
          timeout: 1800s

  task:
    scheduling:
      pool:
        size: 5

napcat:
  ws-url: ws://154.8.213.134:5701
  access-token: ${NAPCAT_ACCESS_TOKEN:}

qq:
  allowed-groups: 1103130289

novel:
  # 章节流水线：false 则跳过「文笔润色」整段 LLM（仍保留内容审核与后续终稿等步骤）
  generation:
    polish-enabled: true
    # —— 角色叙事调度（本章登场 focus + 动态状态注入 + 落库后增量）；下述三开关当前为开；若需与旧版一致可改回 false
    # 本章 JSON：`chapterSetting` 可为 {"notes":"…","chapterCast":{"characters":[{"name":"…","focus":["…"]}],"restrictOthersToBackground":true}}
    # 全书默认：`writingStyleParams` 根键 chapterCastDefault（结构同 chapterCast）
    character-cast-enabled: true
    character-cast-max-names: 5
    character-cast-restrict-background: true
    character-state-inject-enabled: true
    character-state-inject-max-chars: 3500
    character-state-delta-enabled: true
    character-state-delta-temperature: 0.25
    character-state-delta-max-tokens: 1200
  auto-continue:
    default-target: 20
    max-target: 200
  # LLM 瞬时网络错误（如 Connection reset）重试：callAi（大纲正文/初稿/角色/轻小说规划/终稿/sidecar/一致性修复等）、callAiPlanner（M2）
  llm:
    # true 时将润色步骤完整 prompt 写入 polish-debug-dump-dir（含大纲背景与待润色正文），用于离线测试/对比耗时；默认关
    polish-debug-dump-enabled: true
    polish-debug-dump-dir: logs/polish-debug
    # 润色步骤「大纲+设定+文风块」总长度上限（字符），超出截断前缀，减轻远端排队与单次调用过久
    polish-context-max-chars: 18000
    # 文笔润色：超时/空响应/异常时重试（单次读超时仍受 spring.ai.openai.chat.options.timeout 约束）
    polish-max-attempts: 3
    # 两次润色尝试之间的等待（5 分钟 = 300000 ms）
    polish-retry-delay-ms: 300000
    polish-max-tokens: 4096
    polish-temperature: 0.8
    chat-max-attempts: 3
    chat-retry-delay-ms: 1000
    planner-max-attempts: 3
    planner-retry-delay-ms: 1000
  # 大纲生成：防止模型把全书主线压缩成十几～二十章；可调高以更强约束长篇分期
  outline:
    detailed-prefix-chapters: 40
    min-roadmap-chapters: 120
    # 两阶段大纲（效果最好）：先专用调用产出冲突图谱 JSON，再生成 Markdown 大纲并锚定该 JSON；失败则自动退回单阶段
    two-phase-graph-enabled: true
    graph-phase-temperature: 0.35
    # cast 角色表加入图谱后输出更长，略抬高上限减少截断
    graph-phase-max-tokens: 3600
    # 图谱阶段 LLM 调用：瞬时网络错误（如 Connection reset）时最多尝试次数（含首次）；用尽后退回单阶段大纲
    graph-phase-max-attempts: 3
    # 图谱阶段两次尝试之间的等待（毫秒）；可与网关/CDN 恢复节奏对齐
    graph-phase-retry-delay-ms: 1000
    # 角色生成时从 Markdown 大纲摘取的最大字符（世界观/主角/主要/对立/冲突概要）
    character-excerpt-max-chars: 14000
  light-novel:
    # 轻小说：章前多一次模型调用生成节拍规划，再写正文（抑复述、锁主线）；false 则跳过以省耗时/费用
    chapter-planning-enabled: true
  narrative-engine:
    # 叙事引擎 1.0：按管线默认 NarrativeProfile + writingStyleParams.narrative 合并，注入初稿/润色/终稿提示词
    enabled: true
    # M2：章前 Planner 多一次模型调用，输出「叙事脚本」再写初稿；失败或解析失败时静默回退为仅 M1
    two-phase-enabled: true
    # 轻小说已开「章拍规划」时默认不再跑叙事 Planner，避免两套节拍；设 false 可双开（更贵）
    two-phase-skip-with-light-novel-plan: true
    planner-temperature: 0.35
    planner-max-tokens: 1200
    # 叙事阻力层：Planner JSON 增加障碍字段；未返回时初稿仍注入默认「非最优路径」约束（省时可关）
    resistance-layer-enabled: true
    # 流体润滑 Pass：终稿去 AI 味之后、Lint 之前；只加过渡与感知缓冲，不改剧情（省时可关）
    flow-pass-enabled: true
    flow-pass-temperature: 0.35
    flow-pass-max-tokens: 4096
    # M3：终稿后扫描禁止短语/标签句；命中时可选窄幅修订（多一次模型调用）
    lint-enabled: true
    lint-fix-enabled: true
    lint-fix-temperature: 0.35
    lint-fix-max-tokens: 4096
    # M4：章节成功落库后更新书本级承接摘要，下一章初稿注入（关闭则不更新、不注入）
    m4-carryover-enabled: true
    # M7：章节生成时收集 Planner/Lint 结构化快照写入 chapter.narrative_engine_artifact，并暴露只读 API（需 narrative-engine.enabled）
    m7-artifact-enabled: true
    # M9：章节成功落库后聚合跨章叙事状态 JSON 写入 novel.narrative_state_json（含 relationshipHints、tensionRippleHint、schemaVersion）；GET .../narrative-state；下一章初稿附带快照摘录
    m9-crosscut-enabled: true
    # M8：Lint 之后可选「批评」JSON pass + 按严重度触发一轮窄幅重写（多 1～2 次模型调用）
    m8-critic-enabled: true
    m8-rewrite-enabled: true
    m8-critic-temperature: 0.25
    m8-critic-max-tokens: 1500
    m8-rewrite-temperature: 0.35
    m8-rewrite-max-tokens: 4096
    # 触发重写所需最低 issue 严重度：low | medium | high（或 低/中/高）
    m8-rewrite-min-severity: medium

# HTTP 书库：管理员 JWT + 小说「公共/仅管理员」开关；关闭 enabled 则行为与旧版一致（全部可见、无登录）
# 以下为默认内置账号（明文仅便于本地/内网；公网部署请务必改成强密码并勿提交仓库）
app:
  security:
    enabled: true
    admin-username: admin
    admin-password: "NovelAgent#Admin2026"
    jwt-secret: "novel-agent-jwt-hs256-key-min-32-chars-local-default!!"
    jwt-expiration-ms: 86400000

logging:
  level:
    com.start.agent: INFO
    org.springframework.ai: INFO
    org.springframework.ai.retry: ERROR
    com.zaxxer.hikari: WARN
  file:
    name: logs/novel-agent.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
